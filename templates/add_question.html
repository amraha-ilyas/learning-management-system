{% extends "base.html" %}

{% block content %}

<h2>Add Questions</h2>

<form method="POST">

    <input type="text"
           name="question"
           placeholder="Question"
           required>

    <input type="text"
           name="option1"
           placeholder="Option 1"
           required>

    <input type="text"
           name="option2"
           placeholder="Option 2"
           required>

    <input type="text"
           name="option3"
           placeholder="Option 3"
           required>

    <input type="text"
           name="option4"
           placeholder="Option 4"
           required>

    <input type="text"
           name="correct_answer"
           placeholder="Correct Answer"
           required>

    <button type="submit">
        Save Question
    </button>

</form>

<hr>

<h3>Questions</h3>

<table>

<tr>
    <th>Question</th>
    <th>Correct Answer</th>
</tr>

{% for q in questions %}

<tr>

    <td>{{ q[2] }}</td>

    <td>{{ q[7] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
