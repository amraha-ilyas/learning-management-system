{% extends "base.html" %}

{% block content %}

<div class="auth-container">

```
<div class="card">

    <h2>Create Account</h2>

    <form method="POST">

        <input
            type="text"
            name="fullname"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p style="text-align:center; margin-top:15px;">
        Already have an account?
        <a href="{{ url_for('login') }}">
            Login
        </a>
    </p>

</div>
```

</div>

{% endblock %}
